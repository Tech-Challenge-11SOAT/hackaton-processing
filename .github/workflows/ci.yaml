name: Java CI

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  build-test:
    name: Build + Testes + Coverage + Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compilar projeto
        run: mvn -B clean compile -DskipTests=true

      - name: Rodar testes + coverage
        run: mvn -B verify

      - name: Verificar jacoco.xml
        run: ls -la target/site/jacoco/jacoco.xml

      - name: Validar build da imagem Docker
        run: docker build -t app-ci:${{ github.sha }} .

      - name: Upload dos resultados dos testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload do relatório JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B sonar:sonar