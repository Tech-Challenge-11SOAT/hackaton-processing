services:
  postgres:
    image: postgres:16-alpine
    container_name: processing-postgres
    environment:
      POSTGRES_DB: processing_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d processing_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: processing-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  localstack:
    image: localstack/localstack:latest
    container_name: processing-localstack
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      EDGE_PORT: 4566
      LOCALSTACK_AUTH_TOKEN: "${LOCALSTACK_AUTH_TOKEN}"
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  localstack-init:
    image: amazon/aws-cli:latest
    container_name: processing-localstack-init
    environment:
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-east-1"
      S3_INPUT_BUCKET: "${S3_INPUT_BUCKET:-videos}"
      S3_OUTPUT_BUCKET: "${S3_OUTPUT_BUCKET:-frames}"
      LOCALSTACK_AUTH_TOKEN: "${LOCALSTACK_AUTH_TOKEN}"
    depends_on:
      localstack:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until aws --endpoint-url http://localstack:4566 s3api list-buckets >/dev/null 2>&1; do
        echo 'waiting localstack s3...';
        sleep 2;
      done;
      aws --endpoint-url http://localstack:4566 s3api create-bucket --bucket ${S3_INPUT_BUCKET:-videos} >/dev/null 2>&1 || true;
      aws --endpoint-url http://localstack:4566 s3api create-bucket --bucket ${S3_OUTPUT_BUCKET:-frames} >/dev/null 2>&1 || true;
      aws --endpoint-url http://localstack:4566 s3api list-buckets
      "
    restart: "no"

  migration:
    image: postgres:16-alpine
    container_name: processing-migration
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: >
      /bin/sh -c "
      psql postgresql://postgres:postgres@postgres:5432/processing_db?sslmode=disable -f /migrations/001_create_processing_jobs.sql
      "
    restart: "no"

  processing-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: processing-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
      migration:
        condition: service_completed_successfully
    environment:
      HTTP_PORT: "8080"
      HTTP_READ_TIMEOUT: "10s"
      HTTP_WRITE_TIMEOUT: "10s"
      HTTP_IDLE_TIMEOUT: "30s"
      HTTP_SHUTDOWN_TIMEOUT: "15s"
      LOG_LEVEL: "info"
      POSTGRES_URL: "postgres://postgres:postgres@postgres:5432/processing_db?sslmode=disable"
      POSTGRES_MAX_CONNS: "10"
      POSTGRES_MIN_CONNS: "2"
      POSTGRES_MAX_CONN_LIFETIME: "30m"
      POSTGRES_HEALTHCHECK_PERIOD: "30s"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RABBITMQ_QUEUE_VIDEO_PROCESS: "video.process"
      RABBITMQ_QUEUE_STATUS_UPDATE: "status.update"
      RABBITMQ_QUEUE_VIDEO_COMPLETED: "video.completed"
      RABBITMQ_QUEUE_VIDEO_FAILED: "video.failed"
      RABBITMQ_CONSUMER_TAG: "processing-service-consumer"
      RABBITMQ_PREFETCH_COUNT: "1"
      S3_REGION: "us-east-1"
      S3_INPUT_BUCKET: "${S3_INPUT_BUCKET:-videos}"
      S3_OUTPUT_BUCKET: "${S3_OUTPUT_BUCKET:-frames}"
      S3_ENDPOINT: "http://localstack:4566"
      S3_ACCESS_KEY_ID: "test"
      S3_SECRET_ACCESS_KEY: "test"
      S3_USE_PATH_STYLE: "true"
      WORKER_CONCURRENCY: "1"
      WORKER_FFMPEG_BIN: "ffmpeg"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  rabbitmq_data:
  localstack_data:
