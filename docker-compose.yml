services:
  postgres:
    image: postgres:16-alpine
    container_name: processing-postgres
    environment:
      POSTGRES_DB: processing_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d processing_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: processing-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    container_name: processing-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: processing-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/${S3_BUCKET:-processing-videos} &&
      mc anonymous set private local/${S3_BUCKET:-processing-videos}
      "
    restart: "no"

  migration:
    image: postgres:16-alpine
    container_name: processing-migration
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: >
      /bin/sh -c "
      psql postgresql://postgres:postgres@postgres:5432/processing_db?sslmode=disable -f /migrations/001_create_processing_jobs.sql
      "
    restart: "no"

  processing-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: processing-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migration:
        condition: service_completed_successfully
    environment:
      HTTP_PORT: "8080"
      HTTP_READ_TIMEOUT: "10s"
      HTTP_WRITE_TIMEOUT: "10s"
      HTTP_IDLE_TIMEOUT: "30s"
      HTTP_SHUTDOWN_TIMEOUT: "15s"
      LOG_LEVEL: "info"
      POSTGRES_URL: "postgres://postgres:postgres@postgres:5432/processing_db?sslmode=disable"
      POSTGRES_MAX_CONNS: "10"
      POSTGRES_MIN_CONNS: "2"
      POSTGRES_MAX_CONN_LIFETIME: "30m"
      POSTGRES_HEALTHCHECK_PERIOD: "30s"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RABBITMQ_QUEUE_VIDEO_PROCESS: "video.process"
      RABBITMQ_QUEUE_STATUS_UPDATE: "status.update"
      RABBITMQ_QUEUE_VIDEO_COMPLETED: "video.completed"
      RABBITMQ_QUEUE_VIDEO_FAILED: "video.failed"
      RABBITMQ_CONSUMER_TAG: "processing-service-consumer"
      RABBITMQ_PREFETCH_COUNT: "1"
      S3_REGION: "us-east-1"
      S3_BUCKET: "${S3_BUCKET:-processing-videos}"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY_ID: "minioadmin"
      S3_SECRET_ACCESS_KEY: "minioadmin"
      S3_USE_PATH_STYLE: "true"
      WORKER_CONCURRENCY: "1"
      WORKER_FFMPEG_BIN: "ffmpeg"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
